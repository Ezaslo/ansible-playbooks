---
- name: Création d'une VM sur Proxmox avec Hard Stop forcé
  hosts: localhost
  gather_facts: false
  vars:
    proxmox_host: "{{ proxmox_host }}"
    proxmox_user: "{{ proxmox_user | default('root@pam') }}"
    proxmox_password: "{{ proxmox_password }}"
    proxmox_node: "{{ proxmox_node }}"
    vm_name: "{{ vm_name }}"
    vm_id: "{{ vm_id | int }}"
    vm_cores: "{{ vm_cores | default(2) | int }}"
    vm_memory: "{{ vm_memory | default(2048) | int }}"
    vm_disk_size: "{{ vm_disk_size | default('20G') }}"
    vm_storage: "{{ vm_storage | default('local-lvm') }}"
    vm_os_template: "{{ vm_os_template }}"
    vm_ip: "{{ vm_ip }}"
    vm_gateway: "{{ vm_gateway }}"
    vm_netmask: "{{ vm_netmask | default(24) }}"
    vm_dns: "8.8.8.8"
    ssh_public_key: "{{ ssh_public_key | default('') }}"

  tasks:

    # ---------------------------------------------------------------
    # 1. Préparation et Clonage
    # ---------------------------------------------------------------
    - name: Clonage du template {{ vm_os_template }}
      community.general.proxmox_kvm:
        api_host: "{{ proxmox_host }}"
        api_user: "{{ proxmox_user }}"
        api_password: "{{ proxmox_password }}"
        validate_certs: false
        node: "{{ proxmox_node }}"
        newid: "{{ vm_id }}"
        name: "{{ vm_name }}"
        clone: "{{ vm_os_template }}"
        full: true
        storage: "{{ vm_storage }}"
        timeout: 300

    - name: Configuration Hardware et Cloud-Init
      community.general.proxmox_kvm:
        api_host: "{{ proxmox_host }}"
        api_user: "{{ proxmox_user }}"
        api_password: "{{ proxmox_password }}"
        validate_certs: false
        node: "{{ proxmox_node }}"
        vmid: "{{ vm_id }}"
        cores: "{{ vm_cores }}"
        memory: "{{ vm_memory }}"
        ipconfig:
          ipconfig0: "ip={{ vm_ip }}/{{ vm_netmask }},gw={{ vm_gateway }}"
        sshkeys: "{{ ssh_public_key }}"
        update: true

    - name: Redimensionnement disque
      community.general.proxmox_disk:
        api_host: "{{ proxmox_host }}"
        api_user: "{{ proxmox_user }}"
        api_password: "{{ proxmox_password }}"
        validate_certs: false
        vmid: "{{ vm_id }}"
        disk: scsi0
        size: "{{ vm_disk_size }}"
        state: resized

    # ---------------------------------------------------------------
    # 2. Cycle de déblocage (Start -> Attente -> Hard Stop)
    # ---------------------------------------------------------------

    - name: Démarrage initial de la VM
      community.general.proxmox_kvm:
        api_host: "{{ proxmox_host }}"
        api_user: "{{ proxmox_user }}"
        api_password: "{{ proxmox_password }}"
        validate_certs: false
        node: "{{ proxmox_node }}"
        vmid: "{{ vm_id }}"
        state: started

    - name: Pause de 15 secondes (Attente boot/Kernel Panic)
      ansible.builtin.pause:
        seconds: 15

    - name: Authentification API Proxmox
      ansible.builtin.uri:
        url: "https://{{ proxmox_host }}:8006/api2/json/access/ticket"
        method: POST
        validate_certs: false
        body_format: form-urlencoded
        body:
          username: "{{ proxmox_user }}"
          password: "{{ proxmox_password }}"
      register: proxmox_auth

    - name: Force STOP (Hard Stop / Kill) via API
      ansible.builtin.uri:
        url: "https://{{ proxmox_host:8006 }}/api2/json/nodes/{{ proxmox_node }}/qemu/{{ vm_id }}/status/stop"
        method: POST
        validate_certs: false
        headers:
          Cookie: "PVEAuthCookie={{ proxmox_auth.json.data.ticket }}"
          CSRFPreventionToken: "{{ proxmox_auth.json.data.CSRFPreventionToken }}"
      register: stop_api
      failed_when: false

    - name: Pause de 5 secondes (Stabilisation API)
      ansible.builtin.pause:
        seconds: 5

    # ---------------------------------------------------------------
    # 3. Démarrage Final et Validation
    # ---------------------------------------------------------------

    - name: Démarrage final après Hard Reset
      community.general.proxmox_kvm:
        api_host: "{{ proxmox_host }}"
        api_user: "{{ proxmox_user }}"
        api_password: "{{ proxmox_password }}"
        validate_certs: false
        node: "{{ proxmox_node }}"
        vmid: "{{ vm_id }}"
        state: started

    - name: Attente accès SSH ({{ vm_ip }})
      ansible.builtin.wait_for:
        host: "{{ vm_ip }}"
        port: 22
        delay: 15
        timeout: 300
        state: started
      register: ssh_wait

    - name: Ajout à l'inventaire en mémoire
      ansible.builtin.add_host:
        name: "{{ vm_ip }}"
        groups: nouvelles_vms
        ansible_user: ansible
      when: ssh_wait is succeeded

    - name: Récapitulatif
      ansible.builtin.debug:
        msg: "VM {{ vm_name }} déployée avec succès après un Hard Stop forcé."
