---
- name: Création d'une VM sur Proxmox via AWX
  hosts: localhost
  gather_facts: false
  vars:
    proxmox_host: "{{ proxmox_host }}"
    proxmox_user: "{{ proxmox_user | default('root@pam') }}"
    proxmox_password: "{{ proxmox_password }}"
    proxmox_node: "{{ proxmox_node }}"
    vm_name: "{{ vm_name }}"
    vm_id: "{{ vm_id | int }}"
    vm_cores: "{{ vm_cores | default(2) | int }}"
    vm_memory: "{{ vm_memory | default(2048) | int }}"
    vm_disk_size: "{{ vm_disk_size | default('20G') }}"
    vm_storage: "{{ vm_storage | default('local-lvm') }}"
    vm_os_template: "{{ vm_os_template }}"
    vm_ip: "{{ vm_ip }}"
    vm_gateway: "{{ vm_gateway }}"
    vm_netmask: "{{ vm_netmask | default(24) }}"
    vm_dns: "8.8.8.8"
    vm_vlan: ""
    vm_description: "VM creee via AWX"
    vm_tags: "awx"
    vm_start_at_boot: true
    vm_start_after_create: "{{ vm_start_after_create | default(true) | bool }}"
    ssh_public_key: "{{ ssh_public_key | default('') }}"

  tasks:

    # [ Les étapes 1 à 7 restent identiques ]

    # ---------------------------------------------------------------
    # 8. Cycle STOP FORCÉ et START
    # ---------------------------------------------------------------
    
    - name: Action STOP FORCÉ (Hard Stop immédiat)
      community.general.proxmox_kvm:
        api_host: "{{ proxmox_host }}"
        api_user: "{{ proxmox_user }}"
        api_password: "{{ proxmox_password }}"
        validate_certs: false
        node: "{{ proxmox_node }}"
        vmid: "{{ vm_id }}"
        state: stopped
        timeout: 0  # Force l'arrêt immédiat (Kill du processus VM)
      register: stop_result
      when: vm_start_after_create | bool

    - name: Pause de sécurité pour laisser Proxmox rafraîchir l'état
      ansible.builtin.pause:
        seconds: 5
      when: vm_start_after_create | bool

    - name: Action START (Démarrage propre après arrêt forcé)
      community.general.proxmox_kvm:
        api_host: "{{ proxmox_host }}"
        api_user: "{{ proxmox_user }}"
        api_password: "{{ proxmox_password }}"
        validate_certs: false
        node: "{{ proxmox_node }}"
        vmid: "{{ vm_id }}"
        state: started
      when: vm_start_after_create | bool

    # [ Les étapes 9 à 11 restent identiques ]
