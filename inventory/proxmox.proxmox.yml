plugin: community.proxmox.proxmox

url: "{{ lookup('env', 'PROXMOX_URL') }}"
user: "{{ lookup('env', 'PROXMOX_USER') }}"
password: "{{ lookup('env', 'PROXMOX_PASSWORD') }}"
validate_certs: false

want_facts: true

hostname:
  - name

keyed_groups:
  - key: proxmox_node
    prefix: node
  - key: status
    prefix: status

compose:
  ansible_host: name
